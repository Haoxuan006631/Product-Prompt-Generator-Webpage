<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Image Prompt Generator</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f5f3ef;
      color: #222;
    }
    .page { max-width: 1200px; margin: 0 auto; padding: 32px 20px 48px; }
    .header { margin-bottom: 28px; }
    .header h1 { margin: 0 0 10px; font-size: 32px; line-height: 1.2; }
    .header p { margin: 0; color: #666; font-size: 15px; line-height: 1.6; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
    .panel {
      background: #fff;
      border: 1px solid #e5e1da;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }
    .panel h2 { margin: 0 0 16px; font-size: 20px; }
    .section-title {
      margin: 22px 0 12px;
      padding-top: 18px;
      border-top: 1px solid #eee8df;
      font-size: 15px;
      font-weight: 700;
      color: #333;
    }
    .field { margin-bottom: 14px; }
    label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #444; }
    input, textarea, select {
      width: 100%;
      border: 1px solid #d8d3ca;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: #222;
      outline: none;
      transition: 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #222;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }
    textarea { min-height: 76px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .checkbox-row { display: flex; align-items: center; gap: 10px; margin: 10px 0 16px; font-size: 14px; color: #333; }
    .checkbox-row input { width: auto; transform: scale(1.1); }
    .buttons { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
    button {
      border: none;
      border-radius: 999px;
      padding: 11px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }
    .primary { background: #111; color: #fff; }
    .primary:hover { background: #333; }
    .secondary { background: #eee8df; color: #222; }
    .secondary:hover { background: #e2d9cc; }
    .output-box {
      min-height: 620px;
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 14px;
      background: #151515;
      color: #f6f1e9;
      border-radius: 16px;
      padding: 18px;
      overflow: auto;
      border: 1px solid #333;
    }
    .hint { font-size: 12px; color: #777; margin-top: 6px; line-height: 1.5; }
    .status { margin-top: 10px; font-size: 13px; color: #2f7d32; min-height: 18px; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>产品图 Prompt 模块化生成器</h1>
      <p>填写产品、背景与摆放需求，一键生成适合 GPT Image 2 的短版英文提示词。尺寸、比例、色彩、构图等为可选项，不选择则不会写入 Prompt。</p>
    </header>

    <div class="layout">
      <section class="panel">
        <h2>填写需求</h2>

        <div class="field">
          <label for="productName">产品名称 / Product name</label>
          <input id="productName" value="Marshall Bluetooth speaker box" placeholder="例如 Dyson Supersonic hair dryer" />
        </div>

        <div class="field">
          <label for="productDetails">必须保留的产品细节 / Product details to preserve</label>
          <textarea id="productDetails">black box design, Marshall logo, product text, printed speaker image, tattooed hand graphic, labels, edges, proportions, surface texture, and all packaging details</textarea>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="hasBackground" checked />
          <label for="hasBackground" style="margin:0; font-weight:600;">我同时上传了背景图 / I also uploaded a background image</label>
        </div>

        <div class="section-title">背景与场景</div>

        <div class="field">
          <label for="backgroundType">背景图/场景类型 / Background type</label>
          <input id="backgroundType" value="realistic indoor lifestyle scene" />
        </div>

        <div class="field">
          <label for="placement">产品摆放方式 / Placement</label>
          <textarea id="placement">naturally on a wooden floor near a clean wall or living room corner, with the front side clearly visible</textarea>
        </div>

        <div class="field">
          <label for="backgroundElements">需要保留/处理的背景元素 / Background object requirement</label>
          <textarea id="backgroundElements">Keep the scene realistic, clean, warm, and uncluttered.</textarea>
        </div>

        <div class="section-title">可选细节要求</div>
        <div class="hint" style="margin-bottom:14px;">下面选项默认不写入 Prompt。只有选择具体选项时，才会添加到 Requirements 中。</div>

        <div class="row">
          <div class="field">
            <label for="sizeScale">尺寸大小 / Size and scale</label>
            <select id="sizeScale">
              <option value="">默认 / No special requirement</option>
              <option value="Product occupies about 40–50% of image width.">较小：占画面 40–50%</option>
              <option value="Product occupies about 50–60% of image width.">中等：占画面 50–60%</option>
              <option value="Product occupies about 60–70% of image width.">较大：占画面 60–70%</option>
              <option value="Product occupies about 70–80% of image width.">特写：占画面 70–80%</option>
            </select>
          </div>
          <div class="field">
            <label for="imageRatio">画面比例 / Output ratio</label>
            <select id="imageRatio">
              <option value="">默认 / No special requirement</option>
              <option>1:1 square format</option>
              <option>4:5 vertical format</option>
              <option>3:4 vertical format</option>
              <option>16:9 horizontal format</option>
              <option>9:16 vertical format</option>
              <option>Original background image ratio</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="proportion">产品比例 / Product proportion</label>
            <select id="proportion">
              <option value="">默认 / No special requirement</option>
              <option value="Keep original proportions; do not stretch, compress, or distort.">保持原比例，不拉伸/压缩</option>
              <option value="Keep the original rectangular box proportions accurate.">适合包装盒：保持矩形比例</option>
              <option value="Keep the original product shape and silhouette accurate.">适合物体：保持轮廓形状</option>
            </select>
          </div>
          <div class="field">
            <label for="colorAccuracy">色彩要求 / Color accuracy</label>
            <select id="colorAccuracy">
              <option value="">默认 / No special requirement</option>
              <option value="Keep product colors accurate to the uploaded photo.">保持产品原色</option>
              <option value="Keep product colors accurate; background tone may be adjusted.">产品不变，背景可调色</option>
              <option value="Do not make the product warmer, cooler, brighter, darker, or more saturated.">不要改变产品冷暖/明暗/饱和度</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="composition">构图 / Composition</label>
            <select id="composition">
              <option value="">默认 / No special requirement</option>
              <option value="Center the product with balanced spacing.">居中平衡构图</option>
              <option value="Place the product slightly lower than center with clean space above.">产品偏下，上方留白</option>
              <option value="Place the product slightly to the left with negative space on the right.">产品偏左，右侧留白</option>
              <option value="Use a clean product-listing composition.">电商主图构图</option>
              <option value="Use a natural lifestyle composition, not too staged.">自然生活方式构图</option>
            </select>
          </div>
          <div class="field">
            <label for="angle">角度 / Camera angle</label>
            <select id="angle">
              <option value="">默认 / No special requirement</option>
              <option value="Use a straight-on front-facing camera angle.">正面角度</option>
              <option value="Use a slightly low front-facing camera angle.">略低正面角度</option>
              <option value="Use a slight top-down realistic product angle.">轻微俯拍角度</option>
              <option value="Match the camera angle of the uploaded background.">匹配背景图角度</option>
              <option value="Place the product diagonally while keeping the front visible.">斜放但正面可见</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="lighting">光线 / Lighting</label>
            <select id="lighting">
              <option value="">默认 / No special requirement</option>
              <option value="Use soft natural light with realistic contact shadows.">柔和自然光</option>
              <option value="Use warm sunlight with soft shadows.">暖阳光影</option>
              <option value="Use soft even studio lighting.">均匀棚拍光</option>
              <option value="Use dramatic soft studio lighting with subtle highlights.">高级戏剧化棚拍光</option>
              <option value="Match the lighting direction of the uploaded background.">匹配背景图光线方向</option>
            </select>
          </div>
          <div class="field">
            <label for="style">整体风格 / Visual style</label>
            <select id="style">
              <option value="">默认 / No special requirement</option>
              <option value="realistic, clean, warm home lifestyle product photography">真实温暖家居产品图</option>
              <option value="clean professional e-commerce product photography">干净电商产品图</option>
              <option value="premium minimalist commercial product photography">高级极简商业图</option>
              <option value="luxury cinematic product poster style">奢华电影感海报</option>
              <option value="natural second-hand product listing upgraded into a clean lifestyle photo">二手商品图升级版</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="customDescription">自定义补充描述 / Custom description</label>
          <textarea id="customDescription" placeholder="例如：Make it look like a clean second-hand product listing upgraded into a lifestyle commercial photo."></textarea>
          <div class="hint">可写额外氛围、用途、禁止事项、平台用途等。</div>
        </div>

        <div class="field">
          <label for="textRequirement">文字要求 / Text requirement</label>
          <textarea id="textRequirement">Do not add extra text, logos, watermarks, props, hands, or unrelated objects.</textarea>
        </div>

        <div class="buttons">
          <button class="primary" type="button" onclick="generatePrompt()">生成 Prompt</button>
          <button class="secondary" type="button" onclick="copyPrompt()">复制 Prompt</button>
          <button class="secondary" type="button" onclick="resetForm()">重置示例</button>
        </div>
        <div class="status" id="status"></div>
      </section>

      <section class="panel">
        <h2>生成结果</h2>
        <div id="output" class="output-box"></div>
      </section>
    </div>
  </main>

  <script>
    function getValue(id) {
      var el = document.getElementById(id);
      return el ? el.value.trim() : "";
    }

    function addRequirement(parts, text) {
      if (text && text.trim()) parts.push(text.trim());
    }

    function generatePrompt() {
      var productName = getValue("productName") || "uploaded product";
      var productDetails = getValue("productDetails") || "all product details";
      var hasBackground = document.getElementById("hasBackground").checked;
      var backgroundType = getValue("backgroundType") || "realistic product scene";
      var placement = getValue("placement") || "naturally in the scene";
      var backgroundElements = getValue("backgroundElements") || "Keep the scene realistic and natural.";
      var sizeScale = getValue("sizeScale");
      var proportion = getValue("proportion");
      var colorAccuracy = getValue("colorAccuracy");
      var composition = getValue("composition");
      var angle = getValue("angle");
      var lighting = getValue("lighting");
      var style = getValue("style");
      var imageRatio = getValue("imageRatio");
      var customDescription = getValue("customDescription");
      var textRequirement = getValue("textRequirement") || "Do not add extra text.";

      var sceneBlock = "";
      if (hasBackground) {
        sceneBlock = "Use the uploaded " + backgroundType + " as the background. Remove the product's original background and composite the unchanged product into this scene. Place it " + placement + ". Match perspective, scale, angle, lighting, depth of field, and contact shadows. " + backgroundElements;
      } else {
        sceneBlock = "Remove the original background and place the unchanged product in a " + backgroundType + ". Place it " + placement + ". Match perspective, scale, angle, lighting, depth of field, and contact shadows.";
      }

      var reqParts = [];
      addRequirement(reqParts, sizeScale);
      addRequirement(reqParts, proportion);
      addRequirement(reqParts, colorAccuracy);
      addRequirement(reqParts, composition);
      addRequirement(reqParts, angle);
      addRequirement(reqParts, lighting);
      if (style) addRequirement(reqParts, "Style: " + style + ".");
      if (imageRatio) addRequirement(reqParts, "Ratio: " + imageRatio + ".");

      var requirementsBlock = reqParts.length ? "\n\nRequirements: " + reqParts.join(" ") : "";
      var customBlock = customDescription ? "\nCustom: " + customDescription : "";

      var prompt = "Use the uploaded " + productName + " photo as the source of truth. Keep the product visually identical: do not change its " + productDetails + ".\n\n" +
        sceneBlock + requirementsBlock + customBlock + "\n\n" +
        "Only adjust background, placement, shadows, reflections, and lighting for realism. Do not redesign, redraw, recolor, stylize, simplify, beautify, or alter the product. " + textRequirement;

      document.getElementById("output").textContent = prompt;
      document.getElementById("status").textContent = "Prompt 已生成。";
    }

    function copyPrompt() {
      var output = document.getElementById("output");
      if (!output.textContent.trim()) generatePrompt();
      var text = output.textContent;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
          document.getElementById("status").textContent = "已复制到剪贴板。";
        }).catch(function() {
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      var temp = document.createElement("textarea");
      temp.value = text;
      document.body.appendChild(temp);
      temp.select();
      document.execCommand("copy");
      document.body.removeChild(temp);
      document.getElementById("status").textContent = "已复制到剪贴板。";
    }

    function resetForm() {
      document.getElementById("productName").value = "Marshall Bluetooth speaker box";
      document.getElementById("productDetails").value = "black box design, Marshall logo, product text, printed speaker image, tattooed hand graphic, labels, edges, proportions, surface texture, and all packaging details";
      document.getElementById("hasBackground").checked = true;
      document.getElementById("backgroundType").value = "realistic indoor lifestyle scene";
      document.getElementById("placement").value = "naturally on a wooden floor near a clean wall or living room corner, with the front side clearly visible";
      document.getElementById("backgroundElements").value = "Keep the scene realistic, clean, warm, and uncluttered.";
      document.getElementById("sizeScale").value = "";
      document.getElementById("imageRatio").value = "";
      document.getElementById("proportion").value = "";
      document.getElementById("colorAccuracy").value = "";
      document.getElementById("composition").value = "";
      document.getElementById("angle").value = "";
      document.getElementById("lighting").value = "";
      document.getElementById("style").value = "";
      document.getElementById("customDescription").value = "";
      document.getElementById("textRequirement").value = "Do not add extra text, logos, watermarks, props, hands, or unrelated objects.";
      generatePrompt();
    }

    function enableLiveUpdate() {
      var fields = document.querySelectorAll("input, textarea, select");
      fields.forEach(function(field) {
        field.addEventListener("input", generatePrompt);
        field.addEventListener("change", generatePrompt);
      });
    }

    window.onload = function() {
      enableLiveUpdate();
      generatePrompt();
    };
  </script>
</body>
</html>
