<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Image Prompt Generator</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f5f3ef;
      color: #222;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .header {
      margin-bottom: 28px;
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.2;
    }

    .header p {
      margin: 0;
      color: #666;
      font-size: 15px;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      align-items: start;
    }

    .panel {
      background: #fff;
      border: 1px solid #e5e1da;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    .panel h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    .section-title {
      margin: 22px 0 12px;
      padding-top: 18px;
      border-top: 1px solid #eee8df;
      font-size: 15px;
      font-weight: 700;
      color: #333;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #444;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid #d8d3ca;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: #222;
      outline: none;
      transition: 0.2s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #222;
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06);
    }

    textarea {
      min-height: 76px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0 16px;
      font-size: 14px;
      color: #333;
    }

    .checkbox-row input {
      width: auto;
      transform: scale(1.1);
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 11px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .primary {
      background: #111;
      color: #fff;
    }

    .primary:hover {
      background: #333;
    }

    .secondary {
      background: #eee8df;
      color: #222;
    }

    .secondary:hover {
      background: #e2d9cc;
    }

    .output-box {
      min-height: 620px;
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 14px;
      background: #151515;
      color: #f6f1e9;
      border-radius: 16px;
      padding: 18px;
      overflow: auto;
      border: 1px solid #333;
    }

    .hint {
      font-size: 12px;
      color: #777;
      margin-top: 6px;
      line-height: 1.5;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #2f7d32;
      min-height: 18px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>产品图 Prompt 模块化生成器</h1>
      <p>填写产品、背景、摆放方式、尺寸比例、色彩和文字要求，一键生成适合 GPT Image 2 的英文提示词。</p>
    </header>

    <div class="layout">
      <section class="panel">
        <h2>填写需求</h2>

        <div class="field">
          <label for="productName">产品名称 / Product name</label>
          <input id="productName" value="Marshall Bluetooth speaker box" placeholder="例如 Dyson Supersonic hair dryer" />
        </div>

        <div class="field">
          <label for="productDetails">必须保留的产品细节 / Product details to preserve</label>
          <textarea id="productDetails" placeholder="例如 logo, text, label, packaging edges, printed graphics, cable, plug...">design, shape, color, material texture, proportions, logo, text, labels, printed graphics, accessories, and all small details</textarea>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="hasBackground" checked />
          <label for="hasBackground" style="margin:0; font-weight:600;">我同时上传了背景图 / I also uploaded a background image</label>
        </div>

        <div class="section-title">背景与场景</div>

        <div class="field">
          <label for="backgroundType">背景图/场景类型 / Background type</label>
          <input id="backgroundType" value="realistic lifestyle reference scene" placeholder="例如 wooden floor interior background" />
        </div>

        <div class="field">
          <label for="placement">产品摆放方式 / Placement</label>
          <textarea id="placement" placeholder="例如 placed on the wooden floor, centered in the frame...">placed naturally on the wooden floor, centered in the frame, with the front side clearly visible</textarea>
        </div>

        <div class="field">
          <label for="backgroundElements">需要保留/处理的背景元素 / Background object requirement</label>
          <textarea id="backgroundElements" placeholder="例如 keep the cat, wooden floor, furniture and natural light unchanged">Keep the background scene’s original atmosphere, objects, lighting, surface texture, color tone, and composition as much as possible.</textarea>
        </div>

        <div class="section-title">尺寸、比例、色彩与构图</div>

        <div class="row">
          <div class="field">
            <label for="sizeScale">尺寸大小 / Size and scale</label>
            <input id="sizeScale" value="The product should occupy about 70% of the image width." />
          </div>

          <div class="field">
            <label for="imageRatio">画面比例 / Output ratio</label>
            <select id="imageRatio">
              <option>1:1 square format</option>
              <option selected>4:5 vertical format</option>
              <option>3:4 vertical format</option>
              <option>16:9 horizontal format</option>
              <option>9:16 vertical format</option>
              <option>Original background image ratio</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="proportion">产品比例 / Product proportion</label>
          <input id="proportion" value="Keep the original product proportions exactly the same. Do not stretch, compress, widen, or distort the product." />
        </div>

        <div class="field">
          <label for="colorAccuracy">色彩要求 / Color accuracy</label>
          <input id="colorAccuracy" value="Keep the product colors accurate to the uploaded photo. Do not make the product warmer, cooler, brighter, darker, or more saturated than the original." />
        </div>

        <div class="row">
          <div class="field">
            <label for="composition">构图 / Composition</label>
            <input id="composition" value="Center the product with balanced spacing around it." />
          </div>

          <div class="field">
            <label for="angle">角度 / Camera angle</label>
            <input id="angle" value="Use a straight-on front-facing angle." />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="lighting">光线 / Lighting</label>
            <input id="lighting" value="Use soft realistic lighting with natural shadows." />
          </div>

          <div class="field">
            <label for="style">整体风格 / Visual style</label>
            <input id="style" value="realistic, clean, premium, and professional product photography" />
          </div>
        </div>

        <div class="field">
          <label for="customDescription">自定义补充描述 / Custom description</label>
          <textarea id="customDescription" placeholder="例如 Make the scene feel cozy and realistic, like a casual home product photo. 或者 Add premium poster-like atmosphere while keeping the product unchanged."></textarea>
          <div class="hint">这里可以写任何额外要求，比如氛围、用途、禁止事项、画面感觉、平台用途等。</div>
        </div>

        <div class="field">
          <label for="textRequirement">文字要求 / Text requirement</label>
          <textarea id="textRequirement">Do not add any extra text, logos, labels, watermarks, or graphic overlays. No extra text unless it already exists on the product.</textarea>
        </div>

        <div class="buttons">
          <button class="primary" onclick="generatePrompt()">生成 Prompt</button>
          <button class="secondary" onclick="copyPrompt()">复制 Prompt</button>
          <button class="secondary" onclick="resetForm()">重置示例</button>
        </div>
        <div class="status" id="status"></div>
      </section>

      <section class="panel">
        <h2>生成结果</h2>
        <div id="output" class="output-box"></div>
      </section>
    </div>
  </main>

  <script>
    function value(id) {
      return document.getElementById(id).value.trim();
    }

    function generatePrompt() {
      const productName = value("productName") || "uploaded product";
      const productDetails = value("productDetails") || "all product details";
      const hasBackground = document.getElementById("hasBackground").checked;
      const backgroundType = value("backgroundType") || "reference scene";
      const placement = value("placement") || "placed naturally within the scene";
      const backgroundElements = value("backgroundElements") || "Keep the background scene realistic and natural.";
      const sizeScale = value("sizeScale") || "The product should appear naturally scaled within the scene.";
      const proportion = value("proportion") || "Keep the original product proportions exactly the same.";
      const colorAccuracy = value("colorAccuracy") || "Keep the product colors accurate to the uploaded photo.";
      const composition = value("composition") || "Use a clean and balanced composition.";
      const angle = value("angle") || "Match the camera angle of the scene.";
      const lighting = value("lighting") || "Use realistic lighting and shadows.";
      const style = value("style") || "realistic product photography";
      const imageRatio = value("imageRatio") || "1:1 square format";
      const customDescription = value("customDescription");
      const textRequirement = value("textRequirement") || "Do not add extra text.";

      let sceneBlock = "";

      if (hasBackground) {
        sceneBlock = `Use the uploaded ${backgroundType} as the reference background scene. Remove only the original background from the product photo, then composite the unchanged product into the uploaded background image.\n\nPlace the product ${placement}. Match the product’s perspective, scale, angle, lighting direction, depth of field, and realistic contact shadows with the uploaded background. The product should look as if it was originally photographed in that scene.\n\n${backgroundElements}`;
      } else {
        sceneBlock = `Remove only the original background from the product photo. Then place the unchanged product into a ${backgroundType}.\n\nPlace the product ${placement}. Match the perspective, scale, angle, lighting direction, depth of field, and realistic contact shadows of the new scene. The product should look naturally photographed in the scene.`;
      }

      const customBlock = customDescription
        ? `

Custom description:
${customDescription}`
        : "";

      const prompt = `Use the uploaded ${productName} product photo as the source of truth. Preserve the product with pixel-level visual fidelity as much as possible. Do not modify the product’s ${productDetails}. The product must remain identical to the uploaded product photo.

${sceneBlock}

Additional requirements:
- Size and scale: ${sizeScale}
- Product proportion: ${proportion}
- Color accuracy: ${colorAccuracy}
- Composition: ${composition}
- Camera angle: ${angle}
- Lighting: ${lighting}
- Visual style: ${style}
- Output ratio: ${imageRatio}${customBlock}

Add only realistic contact shadows, subtle reflections, and minor lighting adjustments needed to blend the product naturally into the environment. These requirements should only affect the product placement, background, lighting, and composition. Do not redesign, redraw, recolor, stylize, simplify, beautify, or change the product itself.

${textRequirement}`;

      document.getElementById("output").textContent = prompt;
      document.getElementById("status").textContent = "Prompt 已生成。";
    }

    async function copyPrompt() {
      const text = document.getElementById("output").textContent;
      if (!text.trim()) {
        generatePrompt();
      }

      try {
        await navigator.clipboard.writeText(document.getElementById("output").textContent);
        document.getElementById("status").textContent = "已复制到剪贴板。";
      } catch (error) {
        document.getElementById("status").textContent = "复制失败，请手动选择右侧文字复制。";
      }
    }

    function resetForm() {
      document.getElementById("productName").value = "Marshall Bluetooth speaker box";
      document.getElementById("productDetails").value = "design, shape, color, material texture, proportions, logo, text, labels, printed graphics, accessories, and all small details";
      document.getElementById("hasBackground").checked = true;
      document.getElementById("backgroundType").value = "realistic lifestyle reference scene";
      document.getElementById("placement").value = "placed naturally on the wooden floor, centered in the frame, with the front side clearly visible";
      document.getElementById("backgroundElements").value = "Keep the background scene’s original atmosphere, objects, lighting, surface texture, color tone, and composition as much as possible.";
      document.getElementById("sizeScale").value = "The product should occupy about 70% of the image width.";
      document.getElementById("imageRatio").value = "4:5 vertical format";
      document.getElementById("proportion").value = "Keep the original product proportions exactly the same. Do not stretch, compress, widen, or distort the product.";
      document.getElementById("colorAccuracy").value = "Keep the product colors accurate to the uploaded photo. Do not make the product warmer, cooler, brighter, darker, or more saturated than the original.";
      document.getElementById("composition").value = "Center the product with balanced spacing around it.";
      document.getElementById("angle").value = "Use a straight-on front-facing angle.";
      document.getElementById("lighting").value = "Use soft realistic lighting with natural shadows.";
      document.getElementById("style").value = "realistic, clean, premium, and professional product photography";
      document.getElementById("customDescription").value = "";
      document.getElementById("textRequirement").value = "Do not add any extra text, logos, labels, watermarks, or graphic overlays. No extra text unless it already exists on the product.";
      generatePrompt();
    }

    generatePrompt();
  </script>
</body>
</html>
